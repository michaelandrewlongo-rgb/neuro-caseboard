[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "caseprep"
version = "0.1.0"
description = "Generate structured neurosurgical case prep materials"
authors = [{ name = "Michael" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PyMuPDF>=1.23",
    "httpx>=0.27",
    "mcp>=1.0",
    "fastapi>=0.100",
    "uvicorn>=0.30",
    "requests>=2.34.2",
    "pandas>=2.3.3",
    "pydantic>=2.13.4",
]

[project.scripts]
caseprep = "caseprep.cli:main"
caseprep-mcp = "caseprep.mcp_server:run"

[project.optional-dependencies]
dev = ["pytest>=7"]
# Runtime deps for the corpus_topology semantic retriever. The module itself
# lives at ~/corpus_clustering (or $CORPUS_CLUSTERING_PATH); see
# caseprep/integrations/corpus_topology.py for how it is discovered.
semantic = [
    "sentence-transformers>=2.2",
    "numpy>=1.24",
    "psycopg[binary]>=3.1",
    "pgvector>=0.2",
]

[tool.setuptools.packages.find]
where = ["."]
