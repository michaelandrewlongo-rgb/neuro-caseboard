[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "neuro-caseboard"
version = "0.1.0"
description = "Unified neurosurgical case-prep dossier: CasePrep's audited pipeline + textbook-rag's citation-grounded figures, with a corrected report/export surface."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Michael" }]
dependencies = [
    "fpdf2>=2.8",
    "pillow>=10.0",
    "pymupdf>=1.23",
]

# caseprep and textbook-rag are consumed as editable sibling installs, not PyPI
# packages. Install them alongside this package:
#   pip install -e ../caseprep
#   pip install -e ../neuro-textbook-rag        # caseprep-integration-seam branch
# The presentation layer (model/compile/render) imports only caseprep.core.contracts;
# the in-process textbook lane (retrieve.py) imports textbook-rag's engine lazily and
# falls back to the subprocess CLI when it is not importable.

[project.optional-dependencies]
dev = ["pytest>=7", "pdfplumber>=0.11"]
# LLM-backed Explorer (case-specific question generation for any procedure).
# Needs ANTHROPIC_API_KEY at runtime; falls back to the deterministic Explorer without it.
llm = ["anthropic>=0.40"]

[project.scripts]
caseboard = "neuro_caseboard.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["neuro_caseboard*", "neuro_core*", "qa*"]

[tool.setuptools.package-data]
neuro_caseboard = ["assets/fonts/*.ttf"]
