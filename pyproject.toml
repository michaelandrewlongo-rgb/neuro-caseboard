[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "caseprep"
version = "0.1.0"
description = "Generate structured neurosurgical case prep materials"
authors = [{ name = "Michael" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["PyMuPDF>=1.23", "httpx>=0.27", "mcp>=1.0", "fastapi>=0.100", "uvicorn>=0.30"]

[project.scripts]
caseprep = "caseprep.cli:main"
caseprep-mcp = "caseprep.mcp_server:run"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["."]
