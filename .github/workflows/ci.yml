name: CI

# Required PR gate. Everything here is offline, deterministic, and fast: no API keys,
# no GPU, no textbook corpus, no private index, no external service at test time.
# (The only network use is install-time: PyPI wheels. caseprep is vendored in-tree.)

on:
  pull_request:
  push:
    branches: [master]

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  # ---------------------------------------------------------------------------
  # PROVES: every .py in the repo parses (syntax) and there are no stray merge
  # conflict markers or malformed pyproject. Fast first-failure signal, no heavy install.
  # ---------------------------------------------------------------------------
  sanity:
    name: sanity (syntax + repo hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Byte-compile all source (syntax gate)
        run: python -m compileall -q neuro_caseboard neuro_core app tests eval
      - name: pyproject.toml is valid TOML
        run: python -c "import tomllib, pathlib; tomllib.loads(pathlib.Path('pyproject.toml').read_text()); print('pyproject OK')"
      - name: No unresolved merge conflict markers
        run: |
          # Precise: the 7-char marker must be followed by whitespace or end-of-line, so a
          # legitimate divider line of equals signs cannot false-positive.
          if git grep -nE '^(<<<<<<<|>>>>>>>|=======)([ \t]|$)' -- '*.py' '*.toml' '*.md' '*.yml' '*.yaml'; then
            echo "::error::merge conflict markers found"; exit 1
          fi
          echo "no merge markers"

  # ---------------------------------------------------------------------------
  # PROVES: the real core behavior (render/compile/dedup/captions/guard/pipeline/cli +
  # neuro_core retrieval & figure logic), the offline on-disk LanceDB integration tests,
  # and the end-to-end CLI artifact smoke — across the declared Python floor and a modern
  # interpreter. Regression protection lives here.
  # ---------------------------------------------------------------------------
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package[dev]
        run: ./ci/install.sh ".[dev]"
      - name: Show resolved environment (debug aid; assert no heavy ML libs leaked in)
        run: |
          python - <<'PY'
          import importlib.metadata as m
          for p in ["neuro-caseboard","lancedb","numpy","pymupdf","fpdf2","pillow","pdfplumber","pytest"]:
              try: print(f"{p:18s} {m.version(p)}")
              except Exception: print(f"{p:18s} MISSING")
          for p in ["torch","sentence-transformers","open-clip-torch"]:
              try: print(f"{p:18s} {m.version(p)} (unexpected in required CI)")
              except Exception: print(f"{p:18s} absent (expected)")
          PY
      - name: Run full offline test suite (incl. integration + smoke)
        run: python -m pytest -p no:cacheprovider --durations=10
      # The held-out quality-regression gate (offline, deterministic): aggregates section coverage,
      # intake accuracy, [L#] grounding, figure guard/byte-stability, near-dup rate, and red-flag
      # non-contamination on the eval split and fails if any metric drops below eval/BASELINE.json.
      # Runs once (3.12 leg) — it is deterministic, so the 3.10 leg would be redundant.
      - name: Quality-regression gate (eval split)
        if: matrix.python-version == '3.12'
        run: python eval/quality_gate.py

  # ---------------------------------------------------------------------------
  # PROVES: packaging metadata is valid, the wheel builds, and a CLEAN install of just the
  # wheel (declared deps only, resolved from PyPI; caseprep is bundled in the wheel) yields
  # importable modules and a working `caseboard` entry point. The install/dependency/entry-point
  # gate —
  # it is what catches a future undeclared top-level import.
  # ---------------------------------------------------------------------------
  package:
    name: package (build + clean install + entry point)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Clean-room install of the wheel and import every surface
        run: |
          python -m venv .ci-venv
          # shellcheck disable=SC1091
          source .ci-venv/bin/activate
          ./ci/install.sh dist/*.whl
          python - <<'PY'
          import importlib
          mods = [
              "neuro_caseboard.cli", "neuro_caseboard.pipeline", "neuro_caseboard.render_pdf",
              "neuro_caseboard.render_md", "neuro_caseboard.compile", "neuro_caseboard.board_view",
              "neuro_caseboard.briefing_pdf", "neuro_caseboard.retrieve",
              "neuro_core.query", "neuro_core.index", "neuro_core.figure_retriever",
              # vendored caseprep must be bundled in the wheel and importable clean-room:
              "caseprep.core.contracts", "caseprep.explorer.question_manifest",
              "caseprep.retrievers.corpus", "caseprep.audit.card_auditor",
          ]
          for name in mods:
              importlib.import_module(name)
              print("imported", name)
          print("ALL SURFACES IMPORTED")
          PY
      - name: Entry point resolves and runs
        run: |
          # shellcheck disable=SC1091
          source .ci-venv/bin/activate
          caseboard --help
