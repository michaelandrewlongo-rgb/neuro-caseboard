<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CasePrep — Neurosurgical Case Preparation</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e1e4ed;
    --text2: #8b8fa3;
    --accent: #5b8def;
    --accent2: #7c3aed;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 8px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .main { flex: 1; padding: 32px 40px; overflow-y: auto; max-height: 100vh; }
  /* Logo */
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding: 0 8px; }
  .logo-icon {
    width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text2); letter-spacing: 0.5px; }
  /* Search */
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 24px;
  }
  .search-box label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }
  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a7de0; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  /* History */
  .history { flex: 1; overflow-y: auto; }
  .history-title {
    font-size: 11px; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.5px; padding: 0 8px; margin-bottom: 8px;
  }
  .history-item {
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .history-item:hover { background: var(--surface2); }
  .history-item .hi-tool {
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .history-item .hi-time { font-size: 10px; color: var(--text2); float: right; }
  /* Main content */
  .hero { margin-bottom: 32px; }
  .hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .hero p { color: var(--text2); font-size: 15px; }
  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* Results */
  .result-section { margin-bottom: 28px; }
  .result-section h2 {
    font-size: 18px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-section h2 .count { font-size: 13px; color: var(--text2); font-weight: 400; }
  /* Paper cards */
  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .paper-card:hover { border-color: var(--accent); }
  .paper-card .pc-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .paper-card .pc-meta { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .paper-card .pc-meta a { color: var(--accent); text-decoration: none; }
  .paper-card .pc-abstract { font-size: 13px; color: var(--text2); display: none; margin-top: 8px; line-height: 1.5; }
  .paper-card .pc-structured { margin-top: 8px; display: none; }
  .paper-card .pc-structured .section { margin-bottom: 6px; }
  .paper-card .pc-structured .section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
  .paper-card .pc-structured .section-text { font-size: 13px; color: var(--text2); }
  .paper-card.expanded .pc-abstract,
  .paper-card.expanded .pc-structured { display: block; }
  .paper-card .pc-expand {
    font-size: 11px; color: var(--accent); margin-top: 6px; cursor: pointer;
  }
  /* Image grid */
  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .image-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .image-card:hover { border-color: var(--accent); }
  .image-card img {
    width: 100%; height: 200px; object-fit: cover;
    background: var(--bg);
  }
  .image-card .ic-body { padding: 12px 16px; }
  .image-card .ic-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
  .image-card .ic-caption { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .image-card .ic-meta { font-size: 11px; color: var(--text2); margin-top: 6px; }
  /* Status */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .status-bar.loading { border-left: 3px solid var(--yellow); }
  .status-bar.success { border-left: 3px solid var(--green); }
  .status-bar.error { border-left: 3px solid var(--red); }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Case plan list */
  .plan-list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: border-color 0.15s;
  }
  .plan-list-item:hover { border-color: var(--accent); }
  .plan-list-item .pli-topic { font-weight: 600; font-size: 15px; }
  .plan-list-item .pli-date { font-size: 12px; color: var(--text2); }
  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">CP</div>
      <div>
        <div class="logo-text">CasePrep</div>
        <div class="logo-sub">Neurosurgical Research</div>
      </div>
    </div>

    <div class="search-box">
      <label>Search PubMed</label>
      <input type="text" class="search-input" id="pubmed-query" placeholder="e.g. vestibular schwannoma outcomes">
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-search" onclick="doSearch()">Search</button>
      </div>
    </div>

    <div class="search-box">
      <label>Build Case Plan</label>
      <input type="text" class="search-input" id="caseplan-topic" placeholder="e.g. retrosigmoid vestibular schwannoma">
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-build" onclick="doBuild()">Build</button>
      </div>
    </div>

    <div class="search-box">
      <label>Radiology Images</label>
      <input type="text" class="search-input" id="radiology-query" placeholder="e.g. vestibular schwannoma MRI">
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-radiology" onclick="doRadiology()">Search</button>
      </div>
    </div>

    <div class="history">
      <div class="history-title">Recent Searches</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="hero">
      <h1>Case Preparation Dashboard</h1>
      <p>Search PubMed, build case plans, and find radiology images for neurosurgical cases.</p>
    </div>

    <div id="status-area"></div>

    <div class="tabs">
      <div class="tab active" data-tab="results" onclick="switchTab('results')">Results</div>
      <div class="tab" data-tab="caseplans" onclick="switchTab('caseplans')">Case Plans</div>
    </div>

    <div id="tab-results">
      <div id="results-content">
        <div class="empty">
          <div class="emoji">&#x1F52C;</div>
          <h3>Start a search</h3>
          <p>Enter a topic in the sidebar to search PubMed, build a case plan, or find radiology images.</p>
        </div>
      </div>
    </div>

    <div id="tab-caseplans" style="display:none">
      <div id="caseplans-content"></div>
    </div>
  </div>
</div>

<script>
const API = '';

// ── State ────────────────────────────────────────────────────────────────

let currentTab = 'results';

// ── Tabs ─────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-results').style.display = tab === 'results' ? '' : 'none';
  document.getElementById('tab-caseplans').style.display = tab === 'caseplans' ? '' : 'none';
  if (tab === 'caseplans') loadCasePlans();
}

// ── Status ───────────────────────────────────────────────────────────────

function setStatus(msg, type='loading') {
  const el = document.getElementById('status-area');
  if (!msg) { el.innerHTML = ''; return; }
  const icon = type === 'loading' ? '<div class="spinner"></div>' :
               type === 'success' ? '&#x2705;' : '&#x274C;';
  el.innerHTML = `<div class="status-bar ${type}">${icon} ${escHtml(msg)}</div>`;
}

// ── API calls ─────────────────────────────────────────────────────────────

async function api(method, path, params={}) {
  const url = new URL(path, window.location.origin);
  if (method === 'GET') {
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const resp = await fetch(url.toString());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    return resp.json();
  } else {
    const qs = new URLSearchParams(params).toString();
    const resp = await fetch(`${url.toString()}${qs ? '?' + qs : ''}`, { method });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    return resp.json();
  }
}

// ── Search ────────────────────────────────────────────────────────────────

async function doSearch() {
  const query = document.getElementById('pubmed-query').value.trim();
  if (!query) return;
  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  setStatus(`Searching PubMed for "${query}"...`);
  try {
    const data = await api('POST', '/api/search', { query, include_abstracts: true });
    setStatus(`Found results for "${query}"`, 'success');
    renderMarkdown(data.result);
    loadHistory();
  } catch (e) {
    setStatus(`Search failed: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Build Case Plan ───────────────────────────────────────────────────────

async function doBuild() {
  const topic = document.getElementById('caseplan-topic').value.trim();
  if (!topic) return;
  const btn = document.getElementById('btn-build');
  btn.disabled = true;
  setStatus(`Building case plan for "${topic}" — this may take 30-60 seconds...`);
  try {
    const data = await api('POST', '/api/build', { topic });
    const intentLabel = data.intent ? ` — ${data.intent.intent_type}` : '';
    const artifactLabel = data.primary_artifact ? ` (${data.primary_artifact.label})` : '';
    setStatus(`Case plan built: ${data.slug}${intentLabel}${artifactLabel}`, 'success');
    const artifactHeader = data.primary_artifact
      ? `> Browser-visible artifact: ${data.primary_artifact.label}\n\n`
      : '';
    renderMarkdown(`${artifactHeader}${data.summary}`);
    loadHistory();
  } catch (e) {
    setStatus(`Build failed: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Radiology ─────────────────────────────────────────────────────────────

async function doRadiology() {
  const query = document.getElementById('radiology-query').value.trim();
  if (!query) return;
  const btn = document.getElementById('btn-radiology');
  btn.disabled = true;
  setStatus(`Searching radiology images for "${query}"...`);
  try {
    const data = await api('POST', '/api/radiology', { query });
    setStatus(`Radiology search complete for "${query}"`, 'success');
    renderMarkdown(data.result);
    loadHistory();
  } catch (e) {
    setStatus(`Radiology search failed: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Case Plans ────────────────────────────────────────────────────────────

async function loadCasePlans() {
  const el = document.getElementById('caseplans-content');
  el.innerHTML = '<div class="status-bar loading"><div class="spinner"></div> Loading case plans...</div>';
  try {
    const plans = await api('GET', '/api/caseplans');
    if (!plans.length) {
      el.innerHTML = '<div class="empty"><div class="emoji">&#x1F4CB;</div><h3>No case plans yet</h3><p>Build your first case plan from the sidebar.</p></div>';
      return;
    }
    el.innerHTML = plans.map(p => `
      <div class="plan-list-item" onclick="viewCasePlan('${p.slug}')">
        <div>
          <div class="pli-topic">${escHtml(p.topic)}</div>
          <div class="pli-date">${p.created_at}</div>
        </div>
        <div style="color:var(--text2);font-size:12px">slug: ${escHtml(p.slug)}</div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div class="status-bar error">&#x274C; ${escHtml(e.message)}</div>`;
  }
}

async function viewCasePlan(slug) {
  setStatus(`Loading case plan "${slug}"...`);
  try {
    const data = await api('GET', `/api/caseplans/${slug}`);
    setStatus(`Loaded: ${data.topic}`, 'success');
    switchTab('results');

    let html = `<div class="result-section"><h2>${escHtml(data.topic)} <span class="count">Case Plan</span></h2></div>`;

    // Papers
    if (data.papers && data.papers.length) {
      html += '<div class="result-section"><h2>Literature <span class="count">(' + data.papers.length + ' papers)</span></h2>';
      data.papers.forEach((p, i) => {
        html += renderPaperCard(p, i + 1);
      });
      html += '</div>';
    }

    // Images
    if (data.images && data.images.length) {
      html += '<div class="result-section"><h2>Radiology Images <span class="count">(' + data.images.length + ')</span></h2>';
      html += '<div class="image-grid">';
      data.images.forEach(img => {
        const imgSrc = img.local_path && !img.local_path.startsWith('Error')
          ? '/api/images/' + encodeURIComponent(img.local_path.replace(/^\//, ''))
          : img.img_large || '';
        html += `
          <div class="image-card">
            ${imgSrc ? `<img src="${escHtml(imgSrc)}" alt="${escHtml(img.caption || img.title)}" loading="lazy" onerror="this.src='';this.alt='Image unavailable';">` : ''}
            <div class="ic-body">
              <div class="ic-title">${escHtml(img.title || 'Untitled')}</div>
              <div class="ic-caption">${escHtml(img.caption || '')}</div>
              <div class="ic-meta">${escHtml(img.journal || '')} ${escHtml(img.pubdate || '')}</div>
            </div>
          </div>`;
      });
      html += '</div></div>';
    }

    document.getElementById('results-content').innerHTML = html;
  } catch (e) {
    setStatus(`Failed to load case plan: ${e.message}`, 'error');
  }
}

// ── Render helpers ───────────────────────────────────────────────────────

function renderPaperCard(p, num) {
  const pmidLink = p.pmid ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/" target="_blank">PMID: ${p.pmid}</a>` : '';
  const abstract = p.abstract || '';
  const structured = p.structured || {};
  const hasContent = abstract || Object.keys(structured).length;

  let structHtml = '';
  if (Object.keys(structured).length) {
    structHtml = '<div class="pc-structured">';
    for (const [label, text] of Object.entries(structured)) {
      structHtml += `<div class="section"><div class="section-label">${escHtml(label)}</div><div class="section-text">${escHtml(text)}</div></div>`;
    }
    structHtml += '</div>';
  }

  return `
    <div class="paper-card" onclick="this.classList.toggle('expanded')">
      <div class="pc-title">${num}. ${escHtml(p.title || 'Untitled')}</div>
      <div class="pc-meta">${escHtml(p.authors || '')} &mdash; <em>${escHtml(p.source || '')}</em> (${escHtml(p.pubdate || '')}) ${pmidLink}</div>
      ${abstract ? `<div class="pc-abstract">${escHtml(abstract)}</div>` : ''}
      ${structHtml}
      ${hasContent ? '<div class="pc-expand">Click to expand/collapse &#x25BE;</div>' : ''}
    </div>`;
}

function renderMarkdown(text) {
  // Simple markdown-to-HTML for the text reports returned by handlers
  let html = escHtml(text);

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links
  html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');

  // MEDIA tags → image embeds
  html = html.replace(/MEDIA:(\/[^\s<]+)/g, (match, path) => {
    const src = '/api/images/' + encodeURIComponent(path.replace(/^\//, ''));
    return `<img src="${src}" style="max-width:100%;border-radius:6px;margin:8px 0;" loading="lazy" onerror="this.alt='Image unavailable'">`;
  });

  // Wrap in a result section
  document.getElementById('results-content').innerHTML = `
    <div class="result-section">
      <div style="font-size:14px;line-height:1.7;white-space:pre-wrap">${html}</div>
    </div>`;
}

// ── History ───────────────────────────────────────────────────────────────

async function loadHistory() {
  try {
    const history = await api('GET', '/api/history', { limit: 20 });
    const el = document.getElementById('history-list');
    if (!history.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text2);padding:8px">No searches yet</div>'; return; }
    el.innerHTML = history.map(h => `
      <div class="history-item" onclick="replaySearch('${escHtml(h.tool)}','${escHtml(h.query)}')">
        <div class="hi-tool">${escHtml(h.tool.replace('search_','').replace('build_',''))}</div>
        ${escHtml(h.query)}
        <span class="hi-time">${h.created_at?.split('T')[1]?.substring(0,5) || ''}</span>
      </div>
    `).join('');
  } catch (e) { /* history is non-critical */ }
}

function replaySearch(tool, query) {
  if (tool === 'search_pubmed') {
    document.getElementById('pubmed-query').value = query;
    doSearch();
  } else if (tool === 'build_caseplan') {
    document.getElementById('caseplan-topic').value = query;
    doBuild();
  } else if (tool === 'search_radiology') {
    document.getElementById('radiology-query').value = query;
    doRadiology();
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────

// Enter key handlers
document.getElementById('pubmed-query').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('caseplan-topic').addEventListener('keydown', e => { if (e.key === 'Enter') doBuild(); });
document.getElementById('radiology-query').addEventListener('keydown', e => { if (e.key === 'Enter') doRadiology(); });

// Load history on startup
loadHistory();
</script>
</body>
</html>
